# Radar Ofertas — produção
#
# Arquitetura de processos:
#   collector     → 1 réplica (scraping; Playwright pooled + concurrency 1)
#   scheduler     → mensagens automáticas (leve, sem Playwright)
#   worker        → 1 réplica por sessão WhatsApp (Baileys não escala no mesmo número)
#   worker-telegram → stateless; restart on-failure (exit 0 se TELEGRAM_ENABLED=false)
#   manager       → N réplicas possíveis (stateless; lê Redis + owner.lock)
#
# Multi-conta WhatsApp: copie o bloco worker e defina WORKER_ACCOUNT_ID único por serviço.
# Ver docker-compose.accounts.example.yml

x-app-environment: &app-environment
  NODE_ENV: production
  APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
  REDIS_ENABLED: "true"
  DATABASE_URL: postgresql://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD:-radar_secret}@postgres:5432/${POSTGRES_DB:-radar_ofertas}
  REDIS_URL: redis://redis:6379
  WHATSAPP_AUTH_PATH: /app/data/auth_info_baileys
  ML_AUTH_PATH: /app/data/ml_auth
  ML_USE_BROWSER_FALLBACK: ${ML_USE_BROWSER_FALLBACK:-true}
  ML_BROWSER_HEADLESS: ${ML_BROWSER_HEADLESS:-true}

x-app-base: &app-base
  build: .
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *app-environment
  volumes:
    - ./data:/app/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

x-worker-whatsapp: &worker-whatsapp
  <<: *app-base
  command: ["npx", "tsx", "src/worker.ts"]
  environment:
    <<: *app-environment
    SKIP_MIGRATIONS: "true"
    WORKER_ACCOUNT_ID: ${WORKER_ACCOUNT_ID:-}
  # Exit 0 em conflito de sessão (duplicata) não deve reiniciar em loop.
  restart: on-failure

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar_secret}
      POSTGRES_DB: ${POSTGRES_DB:-radar_ofertas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar_ofertas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    restart: "no"
    env_file:
      - .env
    environment:
      <<: *app-environment
    command: ["sh", "-c", "echo Migrations aplicadas"]
    depends_on:
      postgres:
        condition: service_healthy

  collector:
    <<: *app-base
    command: ["npx", "tsx", "src/app.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"

  scheduler:
    <<: *app-base
    command: ["npx", "tsx", "src/scheduler.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"

  worker:
    <<: *worker-whatsapp

  worker-telegram:
    <<: *app-base
    command: ["npx", "tsx", "src/worker-telegram.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"
      WORKER_ACCOUNT_ID: ${WORKER_ACCOUNT_ID:-}
    # Com TELEGRAM_ENABLED=false o processo encerra com exit 0 — não reiniciar.
    restart: on-failure

  manager:
    <<: *app-base
    command: ["npx", "tsx", "manager/server.ts"]
    ports:
      - "${MANAGER_PORT:-3000}:3000"
    environment:
      <<: *app-environment
      MANAGER_PORT: "3000"
      MANAGER_CAN_SPAWN_WORKERS: "false"
      SKIP_MIGRATIONS: "true"

volumes:
  postgres_data:
  redis_data:
