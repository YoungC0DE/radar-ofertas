x-app-environment: &app-environment
  NODE_ENV: production
  REDIS_ENABLED: "true"
  DATABASE_URL: postgresql://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD:-radar_secret}@postgres:5432/${POSTGRES_DB:-radar_ofertas}
  REDIS_URL: redis://redis:6379
  WHATSAPP_AUTH_PATH: /app/data/auth_info_baileys
  ML_AUTH_PATH: /app/data/ml_auth

x-app-base: &app-base
  build: .
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *app-environment
  volumes:
    - ./data:/app/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar_secret}
      POSTGRES_DB: ${POSTGRES_DB:-radar_ofertas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar_ofertas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    restart: "no"
    env_file:
      - .env
    environment:
      <<: *app-environment
    command: ["true"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    <<: *app-base
    command: ["npx", "tsx", "src/app.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"

  # Envio no WhatsApp. Uma única réplica: a sessão Baileys só admite um dono.
  worker:
    <<: *app-base
    command: ["npx", "tsx", "src/worker.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"

  # Envio no Telegram — processo separado, fila própria. Encerra sozinho (exit 0)
  # se TELEGRAM_ENABLED não estiver ligado no .env.
  worker-telegram:
    <<: *app-base
    command: ["npx", "tsx", "src/worker-telegram.ts"]
    environment:
      <<: *app-environment
      SKIP_MIGRATIONS: "true"

  manager:
    <<: *app-base
    command: ["npx", "tsx", "manager/server.ts"]
    ports:
      - "${MANAGER_PORT:-3000}:3000"
    environment:
      <<: *app-environment
      MANAGER_PORT: "3000"
      MANAGER_CAN_SPAWN_WORKERS: "false"
      SKIP_MIGRATIONS: "true"

volumes:
  postgres_data:
  redis_data:
